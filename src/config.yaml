site:
  name: fintechlawyer.ca
  site: 'https://fintechlawyer.ca'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: fintechlawyer.ca
    template: '%s — fintechlawyer.ca'
  description: 'Practical Canadian fintech legal and regulatory information.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: fintechlawyer.ca
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@fintechlawyer'
    site: '@fintechlawyer'
    cardType: summary_large_image

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/insights/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'insights' # Insights hub path.
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'insights/category'
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'insights/tag'
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
